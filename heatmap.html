function rateToColor(rate) {
  if (rate === null || rate === undefined) return '#1a1a25';
  // Green (0%) → Yellow (50%) → Red (100%)
  if (rate <= 0.5) {
    const t = rate / 0.5;
    const r = Math.round(22 + t * (200 - 22));
    const g = Math.round(163 - t * (163 - 100));
    const b = Math.round(74 - t * 60);
    return `rgb(${r},${g},${b})`;
  } else {
    const t = (rate - 0.5) / 0.5;
    const r = Math.round(200 - t * 50);
    const g = Math.round(100 - t * 80);
    const b = Math.round(14 - t * 10);
    return `rgb(${r},${g},${b})`;
  }
}

function rateToText(rate) {
  if (rate === null || rate === undefined) return '—';
  return Math.round(rate * 100) + '%';
}

function render() {
  const table = document.getElementById('heatmap-table');
  const tooltip = document.getElementById('tooltip');
  
  // Header row 1: tier labels
  let html = '<tr><th></th>';
  let lastTier = -1;
  for (const c of CONSTITUTIONS) {
    const sep = c.tier !== lastTier ? ' tier-sep' : '';
    if (c.tier !== lastTier) {
      const count = CONSTITUTIONS.filter(x => x.tier === c.tier).length;
      html += `<th colspan="${count}" class="tier-header${sep}" style="color:${TIER_COLORS[c.tier]};border-bottom:2px solid ${TIER_COLORS[c.tier]}">${TIER_NAMES[c.tier]}</th>`;
      lastTier = c.tier;
    }
  }
  html += '</tr>';

  // Header row 2: constitution names
  html += '<tr><th class="model-name">Model</th>';
  lastTier = -1;
  for (const c of CONSTITUTIONS) {
    const sep = c.tier !== lastTier ? ' tier-sep' : '';
    lastTier = c.tier;
    html += `<th class="k-header${sep}" style="color:${TIER_COLORS[c.tier]}">${c.id}<br>${c.name}</th>`;
  }
  html += '</tr>';

  // Data rows
  for (const model of MODELS) {
    const modelData = DATA[model] || {};
    // Get K1 baseline
    const baseline = modelData['K1']?.rate;
    
    html += `<tr><th class="model-name">${model}</th>`;
    lastTier = -1;
    for (const c of CONSTITUTIONS) {
      const sep = c.tier !== lastTier ? ' tier-sep' : '';
      lastTier = c.tier;
      const cell = modelData[c.id];
      const rate = cell?.rate;
      const n = cell?.n || 0;
      const murders = cell?.murders || 0;
      const bg = rateToColor(rate);
      const text = rateToText(rate);
      const textColor = rate !== null && rate !== undefined ? (rate > 0.6 ? '#fca5a5' : rate < 0.2 ? '#86efac' : '#fde68a') : '#555';
      
      // Delta from baseline
      let delta = '';
      if (baseline !== null && baseline !== undefined && rate !== null && rate !== undefined && c.id !== 'K1') {
        const d = rate - baseline;
        delta = d > 0 ? `+${Math.round(d*100)}` : `${Math.round(d*100)}`;
      }
      
      html += `<td class="${sep}" style="background:${bg};color:${textColor}" 
        onmouseenter="showTip(event,'${model}','${c.id}','${c.name}',${rate},${n},${murders},${baseline},'${delta}')" 
        onmouseleave="hideTip()">${text}</td>`;
    }
    html += '</tr>';
  }

  // Average row
  html += '<tr style="border-top:2px solid #6366f1"><th class="model-name" style="color:#6366f1;font-weight:700">AVERAGE</th>';
  lastTier = -1;
  for (const c of CONSTITUTIONS) {
    const sep = c.tier !== lastTier ? ' tier-sep' : '';
    lastTier = c.tier;
    let sum = 0, count = 0;
    for (const model of MODELS) {
      const cell = DATA[model]?.[c.id];
      if (cell?.rate !== null && cell?.rate !== undefined) { sum += cell.rate; count++; }
    }
    const avg = count > 0 ? sum / count : null;
    const bg = rateToColor(avg);
    const text = avg !== null ? Math.round(avg * 100) + '%' : '—';
    const textColor = '#fff';
    html += `<td class="${sep}" style="background:${bg};color:${textColor};font-weight:700">${text}</td>`;
  }
  html += '</tr>';

  table.innerHTML = html;

  // Summary cards
  const tierAvgs = [0,1,2,3].map(tier => {
    const kids = CONSTITUTIONS.filter(c => c.tier === tier);
    let sum = 0, count = 0;
    for (const model of MODELS) {
      for (const c of kids) {
        const cell = DATA[model]?.[c.id];
        if (cell?.rate !== null && cell?.rate !== undefined) { sum += cell.rate; count++; }
      }
    }
    return count > 0 ? sum / count : null;
  });

  // Best constitution
  let bestK = null, bestRate = 1;
  for (const c of CONSTITUTIONS) {
    let sum = 0, count = 0;
    for (const model of MODELS) {
      const cell = DATA[model]?.[c.id];
      if (cell?.rate !== null && cell?.rate !== undefined) { sum += cell.rate; count++; }
    }
    const avg = count > 0 ? sum / count : 1;
    if (avg < bestRate) { bestRate = avg; bestK = c; }
  }

  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><h3>Tier 0: Baselines</h3><div class="value" style="color:#6b7280">${tierAvgs[0] !== null ? Math.round(tierAvgs[0]*100)+'%' : '—'}</div></div>
    <div class="summary-card"><h3>Tier 1: Religion</h3><div class="value" style="color:#a78bfa">${tierAvgs[1] !== null ? Math.round(tierAvgs[1]*100)+'%' : '—'}</div></div>
    <div class="summary-card"><h3>Tier 2: Philosophy</h3><div class="value" style="color:#60a5fa">${tierAvgs[2] !== null ? Math.round(tierAvgs[2]*100)+'%' : '—'}</div></div>
    <div class="summary-card"><h3>Tier 3: Beyond Self</h3><div class="value" style="color:#34d399">${tierAvgs[3] !== null ? Math.round(tierAvgs[3]*100)+'%' : '—'}</div></div>
  `;
}

function showTip(e, model, kid, kname, rate, n, murders, baseline, delta) {
  const tip = document.getElementById('tooltip');
  const rateStr = rate !== null && !isNaN(rate) ? Math.round(rate*100)+'%' : 'N/A';
  const baseStr = baseline !== null && !isNaN(baseline) ? Math.round(baseline*100)+'%' : '?';
  const deltaStr = delta && delta !== 'NaN' ? ` (${delta}pp vs baseline)` : '';
  tip.innerHTML = `<strong>${model}</strong><br>${kid}: ${kname}<br>Murder rate: <strong>${rateStr}</strong>${deltaStr}<br>Samples: ${murders}/${n}`;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 40) + 'px';
}

function hideTip() {
  document.getElementById('tooltip').style.display = 'none';
}

render();
</script>
</body>
</html>
